# ─── LanceDB storage ───
databasePath: ./data/lancedb

# ─── Git repos clone directory ───
reposPath: ./data/repos

# ─── Source state persistence ───
statePath: ./data/sources-state.json

# ─── Embedding configuration ───
embedding:
  provider: transformers # "transformers" (local ONNX) or "ollama"
  model: Xenova/all-MiniLM-L6-v2 # HuggingFace model ID
  dimensions: 384 # Must match the model output
  # ollamaBaseUrl: http://localhost:11434 # Only for ollama provider

# ─── Chunker configuration ───
chunker:
  maxChunkSize: 1000
  chunkOverlap: 200
  similarityThresholdPercentile: 75
  minChunkSentences: 2

# ─── MCP transport ───
mcpTransport: stdio # "stdio" for local IDE integration, "http" for remote/Docker

# ─── Server (only used when mcpTransport: http) ───
server:
  port: 3000
  host: 0.0.0.0

# ─── Document Sources ───
