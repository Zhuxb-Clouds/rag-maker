# Production compose file - uses pre-built image directly
# Load image first: docker load < rag-maker.tar.gz
services:
  rag-maker:
    image: rag-maker:latest
    container_name: rag-maker
    restart: unless-stopped
    ports:
      - "10086:10086"
    volumes:
      - ./data/lancedb:/app/data/lancedb
      - ./data/repos:/app/data/repos
      - ./data/sources-state.json:/app/data/sources-state.json
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - RAG_CONFIG_PATH=/app/config/sources.yaml
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:10086/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
